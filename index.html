<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社媒数据整合工具 - 专业版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin-right: 10px;
        }
        .file-upload {
            margin: 10px 0;
        }
        .file-upload label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .file-upload input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload input[type="file"]:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .file-status {
            font-size: 12px;
            margin-top: 5px;
        }
        .file-status.success { color: #28a745; }
        .file-status.error { color: #dc3545; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .button-group {
            text-align: center;
            margin-top: 30px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .progress {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .info-box h3 {
            color: #1976D2;
            margin-bottom: 10px;
        }
        .info-box ul {
            margin-left: 20px;
            color: #555;
        }
        .info-box li {
            margin: 5px 0;
        }
        .log-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }
        .log-item {
            margin: 5px 0;
            padding: 5px;
            border-radius: 4px;
        }
        .log-item.info { background: #d1ecf1; color: #0c5460; }
        .log-item.success { background: #d4edda; color: #155724; }
        .log-item.warning { background: #fff3cd; color: #856404; }
        .log-item.error { background: #f8d7da; color: #721c24; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 社媒数据整合工具</h1>
        <p class="subtitle">网页版 · 无需安装 · 本地处理 · 数据安全</p>
        
        <div class="info-box">
            <h3>📖 使用说明：</h3>
            <ul>
                <li><strong>步骤 1：</strong>上传总表模板（必须包含 Sheet10 账号映射表）</li>
                <li><strong>步骤 2：</strong>上传 5 个平台的源数据文件（有哪个传哪个）</li>
                <li><strong>步骤 3：</strong>点击"开始生成总表"按钮</li>
                <li><strong>步骤 4：</strong>下载生成的 Excel 总表</li>
                <li><strong>⚠️ 注意：</strong>所有数据处理都在本地完成，不会上传到服务器</li>
            </ul>
        </div>
        
        <div class="section">
            <div class="section-title">步骤 1：上传总表模板（必须）</div>
            <div class="file-upload">
                <label>📋 总数据表格.xlsx</label>
                <input type="file" id="templateFile" accept=".xlsx,.xls" />
                <div class="file-status" id="templateStatus"></div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">步骤 2：上传各平台数据（有哪个传哪个）</div>
            <div class="grid-2">
                <div class="file-upload">
                    <label>📘 Facebook 数据</label>
                    <input type="file" id="fbFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="fbStatus"></div>
                </div>
                <div class="file-upload">
                    <label>📸 Instagram 数据</label>
                    <input type="file" id="insFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="insStatus"></div>
                </div>
                <div class="file-upload">
                    <label>🎵 TikTok 数据</label>
                    <input type="file" id="ttFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="ttStatus"></div>
                </div>
                <div class="file-upload">
                    <label>▶️ YouTube 数据</label>
                    <input type="file" id="ytFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="ytStatus"></div>
                </div>
                <div class="file-upload">
                    <label>𝕏 X/Twitter 数据</label>
                    <input type="file" id="xFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="xStatus"></div>
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn" id="generateBtn" onclick="generateReport()">🚀 开始生成总表</button>
            <button class="btn" onclick="resetForm()" style="background: #6c757d;">🔄 重置</button>
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="log-box" id="logBox" style="display:none;">
            <strong>📝 处理日志：</strong>
            <div id="logContent"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let accountMapping = {};
        let products = [];
        
        // 日志功能
        function addLog(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const logContent = document.getElementById('logContent');
            logBox.style.display = 'block';
            
            const logItem = document.createElement('div');
            logItem.className = `log-item ${type}`;
            logItem.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.appendChild(logItem);
            logBox.scrollTop = logBox.scrollHeight;
        }
        
        // 显示状态
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }
        
        // 更新进度
        function updateProgress(percent) {
            document.getElementById('progress').style.display = 'block';
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressFill').textContent = Math.round(percent) + '%';
        }
        
        // 文件状态
        function setFileStatus(fileId, statusId, success) {
            const statusDiv = document.getElementById(statusId);
            if (success) {
                statusDiv.textContent = '✅ 已加载';
                statusDiv.className = 'file-status success';
            } else {
                statusDiv.textContent = '❌ 未选择';
                statusDiv.className = 'file-status error';
            }
        }
        
        // 重置
        function resetForm() {
            ['templateFile', 'fbFile', 'insFile', 'ttFile', 'ytFile', 'xFile'].forEach(id => {
                document.getElementById(id).value = '';
            });
            ['templateStatus', 'fbStatus', 'insStatus', 'ttStatus', 'ytStatus', 'xStatus'].forEach(id => {
                document.getElementById(id).textContent = '';
                document.getElementById(id).className = 'file-status';
            });
            document.getElementById('progress').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('logBox').style.display = 'none';
            document.getElementById('logContent').innerHTML = '';
            accountMapping = {};
            products = [];
        }
        
        // 读取文件
        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        resolve(workbook);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }
        
        // 加载账号映射
        function loadAccountMapping(workbook) {
            if (!workbook.Sheets['Sheet10']) {
                throw new Error('模板中未找到 Sheet10 账号映射表');
            }
            
            const sheet = workbook.Sheets['Sheet10'];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            accountMapping = {};
            products = [];
            
            json.forEach(row => {
                const product = row['产品名称'] || row['产品名称.1'];
                if (!product) return;
                
                if (!products.includes(product)) {
                    products.push(product);
                }
                
                const platforms = {
                    'FB': row['Facebook page name'],
                    'INS': row['ins name'],
                    'TT': row['TikTok name'],
                    'YT': row['Youtube name'],
                    'X': row['X']
                };
                
                Object.entries(platforms).forEach(([platform, account]) => {
                    if (account && typeof account === 'string') {
                        const accKey = account.trim().toLowerCase();
                        accountMapping[accKey] = {
                            product: product,
                            platform: platform
                        };
                    }
                });
            });
            
            addLog(`已加载 ${Object.keys(accountMapping).length} 个账号映射`, 'success');
            addLog(`识别到 ${products.length} 个产品：${products.join(', ')}`, 'info');
            
            return accountMapping;
        }
        
        // 解析日期
        function parseDate(dateValue) {
            if (!dateValue) return null;
            
            if (dateValue instanceof Date) {
                return dateValue;
            }
            
            if (typeof dateValue === 'string') {
                const str = dateValue.trim();
                
                // 格式 1: 01/31/2026 08:00 (FB/INS)
                if (str.includes('/')) {
                    const match = str.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
                    if (match) {
                        return new Date(`${match[3]}-${match[1]}-${match[2]}`);
                    }
                }
                
                // 格式 2: 22-Jan-26 (YT/TT)
                if (str.includes('-') && /[A-Z][a-z]{2}/.test(str)) {
                    const date = new Date(str);
                    if (!isNaN(date.getTime())) {
                        return date;
                    }
                }
                
                // 格式 3: Wed Mar 11 17:02:58 +0000 2026 (X)
                if (str.includes('+0000')) {
                    const date = new Date(str);
                    if (!isNaN(date.getTime())) {
                        return date;
                    }
                }
                
                // 格式 4: 2026-03-01
                if (str.includes('-') && /^\d{4}-\d{2}-\d{2}/.test(str)) {
                    const date = new Date(str);
                    if (!isNaN(date.getTime())) {
                        return date;
                    }
                }
                
                // 兜底
                const date = new Date(str);
                if (!isNaN(date.getTime())) {
                    return date;
                }
            }
            
            return null;
        }
        
        // 格式化日期
        function formatDate(date) {
            if (!date) return '';
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }
        
        // 获取数值
        function getNumber(row, keys) {
            if (!keys) return 0;
            if (!Array.isArray(keys)) keys = [keys];
            
            for (let key of keys) {
                if (row[key] !== undefined && row[key] !== null && row[key] !== '') {
                    const num = parseFloat(row[key]);
                    if (!isNaN(num)) {
                        return num;
                    }
                }
            }
            return 0;
        }
        
        // 主处理函数
        async function generateReport() {
            const generateBtn = document.getElementById('generateBtn');
            generateBtn.disabled = true;
            
            try {
                updateProgress(0);
                document.getElementById('logBox').style.display = 'block';
                document.getElementById('logContent').innerHTML = '';
                
                addLog('🚀 开始处理数据...', 'info');
                
                // 1. 加载模板
                const templateFile = document.getElementById('templateFile').files[0];
                if (!templateFile) {
                    throw new Error('请先上传总表模板文件');
                }
                
                updateProgress(5);
                addLog('📋 正在读取模板文件...', 'info');
                
                const templateWorkbook = await readFile(templateFile);
                loadAccountMapping(templateWorkbook);
                
                updateProgress(10);
                
                // 2. 处理各平台数据
                const allRecords = [];
                const platforms = [
                    { id: 'fbFile', name: 'Facebook', key: 'FB' },
                    { id: 'insFile', name: 'Instagram', key: 'INS' },
                    { id: 'ttFile', name: 'TikTok', key: 'TT' },
                    { id: 'ytFile', name: 'YouTube', key: 'YT' },
                    { id: 'xFile', name: 'X/Twitter', key: 'X' }
                ];
                
                let completedPlatforms = 0;
                
                for (let platform of platforms) {
                    const fileInput = document.getElementById(platform.id);
                    const file = fileInput.files[0];
                    
                    if (!file) {
                        addLog(`⚠️  ${platform.name} 文件未上传，跳过`, 'warning');
                        completedPlatforms++;
                        updateProgress(10 + (completedPlatforms / platforms.length) * 60);
                        continue;
                    }
                    
                    addLog(`📊 正在处理 ${platform.name}...`, 'info');
                    
                    try {
                        const workbook = await readFile(file);
                        const sheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];
                        const json = XLSX.utils.sheet_to_json(sheet);
                        
                        let matched = 0;
                        let unmatched = 0;
                        
                        json.forEach(row => {
                            let account = null;
                            let date = null;
                            
                            // 获取账号和日期
                            if (platform.key === 'FB') {
                                account = row['公共主页名称'] || row['公共主页编号'];
                                date = row['发布时间'] || row['日期'];
                            } else if (platform.key === 'INS') {
                                account = row['账户账号'] || row['账户编号'];
                                date = row['发布时间'] || row['日期'];
                            } else if (platform.key === 'TT') {
                                account = row['账户账号'] || row['视频标题'];
                                date = row['视频发布时间'] || row['发布日期'];
                            } else if (platform.key === 'YT') {
                                account = row['视频标题'] || row['账号 ID'];
                                date = row['视频发布时间'];
                            } else if (platform.key === 'X') {
                                account = row['Original Tweet User Screen Name'] || row['账户'];
                                date = row['Created At'];
                            }
                            
                            if (!account || !date) {
                                unmatched++;
                                return;
                            }
                            
                            const dateObj = parseDate(date);
                            if (!dateObj) {
                                unmatched++;
                                return;
                            }
                            
                            const accountKey = String(account).trim().toLowerCase();
                            const mapping = accountMapping[accountKey];
                            
                            if (!mapping) {
                                unmatched++;
                                return;
                            }
                            
                            matched++;
                            
                            const dateStr = formatDate(dateObj);
                            
                            // 提取指标
                            const record = {
                                product: mapping.product,
                                platform: platform.key,
                                date: dateStr,
                                dateObj: dateObj,
                                posts: 1,
                                views: 0,
                                engagement: 0,
                                followers: 0
                            };
                            
                            // 根据平台提取不同指标
                            if (platform.key === 'FB') {
                                record.views = getNumber(row, ['观看量', '覆盖人数']);
                                record.engagement = getNumber(row, ['心情、评论和分享', '评论数', '分享次数']);
                            } else if (platform.key === 'INS') {
                                record.views = getNumber(row, ['浏览量', '覆盖人数']);
                                record.engagement = getNumber(row, ['赞']) + getNumber(row, ['评论']) + getNumber(row, ['分享']);
                            } else if (platform.key === 'TT') {
                                record.views = getNumber(row, ['观看次数', '浏览量']);
                                record.engagement = getNumber(row, ['点赞量']) + getNumber(row, ['评论量']);
                            } else if (platform.key === 'YT') {
                                record.views = getNumber(row, ['观看次数']);
                                record.followers = getNumber(row, ['订阅人数']);
                            } else if (platform.key === 'X') {
                                record.views = getNumber(row, ['View Count']);
                                record.engagement = getNumber(row, ['Reply Count']) + getNumber(row, ['Retweet Count']) + getNumber(row, ['Favorite Count']);
                            }
                            
                            allRecords.push(record);
                        });
                        
                        addLog(`  ✅ ${platform.name}: 总记录 ${json.length} | 匹配 ${matched} | 未匹配 ${unmatched}`, matched > 0 ? 'success' : 'warning');
                        
                    } catch (error) {
                        addLog(`  ❌ ${platform.name} 处理失败：${error.message}`, 'error');
                    }
                    
                    completedPlatforms++;
                    updateProgress(10 + (completedPlatforms / platforms.length) * 60);
                }
                
                if (allRecords.length === 0) {
                    throw new Error('没有有效数据可合并，请检查账号映射和数据文件');
                }
                
                addLog(`📈 共收集 ${allRecords.length} 条有效记录`, 'success');
                
                updateProgress(75);
                addLog('🔗 正在聚合数据...', 'info');
                
                // 3. 按产品 + 日期聚合
                const productData = {};
                
                products.forEach(product => {
                    productData[product] = {};
                });
                
                allRecords.forEach(record => {
                    if (!productData[record.product]) {
                        productData[record.product] = {};
                    }
                    
                    if (!productData[record.product][record.date]) {
                        productData[record.product][record.date] = {
                            date: record.date,
                            dateObj: record.dateObj,
                            FB: { posts: 0, views: 0, engagement: 0 },
                            INS: { posts: 0, views: 0, engagement: 0 },
                            TT: { posts: 0, views: 0, engagement: 0 },
                            YT: { posts: 0, views: 0, followers: 0 },
                            X: { posts: 0, views: 0, engagement: 0 }
                        };
                    }
                    
                    const dayData = productData[record.product][record.date];
                    dayData[record.platform].posts += record.posts;
                    dayData[record.platform].views += record.views;
                    dayData[record.platform].engagement += record.engagement;
                    if (record.followers) {
                        dayData[record.platform].followers = record.followers;
                    }
                });
                
                updateProgress(85);
                addLog('📅 正在生成日期范围...', 'info');
                
                // 4. 生成连续日期
                const allDates = new Set();
                Object.values(productData).forEach(prod => {
                    Object.keys(prod).forEach(date => allDates.add(date));
                });
                
                const sortedDates = Array.from(allDates).sort();
                
                addLog(`📅 日期范围：${sortedDates[0]} 至 ${sortedDates[sortedDates.length - 1]} (共 ${sortedDates.length} 天)`, 'info');
                
                updateProgress(90);
                addLog('💾 正在生成 Excel 文件...', 'info');
                
                // 5. 生成 Excel
                const outputWorkbook = XLSX.utils.book_new();
                
                products.forEach(product => {
                    const finalData = sortedDates.map(date => {
                        const dayData = productData[product][date] || {
                            date: date,
                            FB: { posts: 0, views: 0, engagement: 0 },
                            INS: { posts: 0, views: 0, engagement: 0 },
                            TT: { posts: 0, views: 0, engagement: 0 },
                            YT: { posts: 0, views: 0, followers: 0 },
                            X: { posts: 0, views: 0, engagement: 0 }
                        };
                        
                        return {
                            '产品名称': product,
                            '发布日期': dayData.date,
                            'FB 贴子数': dayData.FB.posts,
                            'FB 浏览量': dayData.FB.views,
                            'FB 互动量': dayData.FB.engagement,
                            'INS 贴子数': dayData.INS.posts,
                            'INS 浏览量': dayData.INS.views,
                            'INS 互动量': dayData.INS.engagement,
                            'TT 贴子数': dayData.TT.posts,
                            'TT 浏览量': dayData.TT.views,
                            'TT 互动量': dayData.TT.engagement,
                            'YT 贴子数': dayData.YT.posts,
                            'YT 浏览量': dayData.YT.views,
                            'YT 粉丝数': dayData.YT.followers,
                            'X 贴子数': dayData.X.posts,
                            'X 浏览量': dayData.X.views,
                            'X 互动量': dayData.X.engagement
                        };
                    });
                    
                    const worksheet = XLSX.utils.json_to_sheet(finalData);
                    
                    // 设置列宽
                    const wscols = [
                        { wch: 20 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 12 },
                        { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 },
                        { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 },
                        { wch: 12 }, { wch: 12 }
                    ];
                    worksheet['!cols'] = wscols;
                    
                    const sheetName = product.substring(0, 31);
                    XLSX.utils.book_append_sheet(outputWorkbook, worksheet, sheetName);
                    addLog(`  ✅ 已生成：${sheetName}`, 'success');
                });
                
                // 添加 Sheet10
                if (templateWorkbook.Sheets['Sheet10']) {
                    XLSX.utils.book_append_sheet(outputWorkbook, templateWorkbook.Sheets['Sheet10'], 'Sheet10');
                }
                
                // 添加产品汇总表
                const summaryData = products.map(product => {
                    const prodRecords = allRecords.filter(r => r.product === product);
                    return {
                        '产品': product,
                        '发布贴子总数': prodRecords.length,
                        '总浏览量': prodRecords.reduce((sum, r) => sum + r.views, 0),
                        '总互动量': prodRecords.reduce((sum, r) => sum + r.engagement, 0)
                    };
                });
                
                const summarySheet = XLSX.utils.json_to_sheet(summaryData);
                XLSX.utils.book_append_sheet(outputWorkbook, summarySheet, '产品汇总');
                
                updateProgress(100);
                
                // 下载文件
                const fileName = `总数据表格_${new Date().toISOString().slice(0, 7)}.xlsx`;
                XLSX.writeFile(outputWorkbook, fileName);
                
                addLog(`🎉 完成！文件已下载：${fileName}`, 'success');
                showStatus(`✅ 总表生成成功！文件已下载：${fileName}`, 'success');
                
            } catch (error) {
                console.error(error);
                addLog(`❌ 错误：${error.message}`, 'error');
                showStatus('❌ 错误：' + error.message, 'error');
                updateProgress(0);
            } finally {
                generateBtn.disabled = false;
            }
        }
        
        // 文件选择监听
        ['templateFile', 'fbFile', 'insFile', 'ttFile', 'ytFile', 'xFile'].forEach((id, index) => {
            const input = document.getElementById(id);
            const statusId = ['templateStatus', 'fbStatus', 'insStatus', 'ttStatus', 'ytStatus', 'xStatus'][index];
            
            input.addEventListener('change', () => {
                setFileStatus(id, statusId, input.files.length > 0);
            });
        });
    </script>
</body>
</html>
